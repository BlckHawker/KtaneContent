<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1">
    <title>Wire Sequences — Keep Talking and Nobody Explodes Module</title>
    <link rel="stylesheet" type="text/css" href="css/font.css">
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/Modules/Wire Sequence.css">
    <script src="js/ktane-utils.js"></script>
    <script src='js/ruleseed.js'></script>
    <script>
        var NUM_PAGES = 4;
        var NUM_PER_PAGE = 3;
        var NUM_COLOURS = 3;
        var BLANK_PAGE_COUNT = 1;

        var NumWiresPerColour = NUM_PER_PAGE * (NUM_PAGES - BLANK_PAGE_COUNT);

        function setDefaultRules()
        {
            var array = this.PopulateEmptySolution();
            var array2 = this.PopulateEmptySolution();
            var array3 = this.PopulateEmptySolution();
            array[0].push(2);
            array[1].push(1);
            array[2].push(0);
            array[3].push(0);
            array[3].push(2);
            array[4].push(1);
            array[5].push(0);
            array[5].push(2);
            array[6].push(0);
            array[6].push(1);
            array[6].push(2);
            array[7].push(0);
            array[7].push(1);
            array[8].push(1);
            array2[0].push(1);
            array2[1].push(0);
            array2[1].push(2);
            array2[2].push(1);
            array2[3].push(0);
            array2[4].push(1);
            array2[5].push(1);
            array2[5].push(2);
            array2[6].push(2);
            array2[7].push(0);
            array2[7].push(2);
            array2[8].push(0);
            array3[0].push(0);
            array3[0].push(1);
            array3[0].push(2);
            array3[1].push(0);
            array3[1].push(2);
            array3[2].push(1);
            array3[3].push(0);
            array3[3].push(2);
            array3[4].push(1);
            array3[5].push(1);
            array3[5].push(2);
            array3[6].push(0);
            array3[6].push(1);
            array3[7].push(2);
            array3[8].push(2);
            setWireSequenceRules(array, array2, array3);
        }

        function setRules(rnd)
        {
            var array = PopulateSolution(rnd);
            var array2 = PopulateSolution(rnd);
            var array3 = PopulateSolution(rnd);
            setWireSequenceRules(array, array2, array3);
        }
        
        function drawLine(index, color, wire1, wire2) {
            return `<line x1=${33+index*33} x2=${66+index*33} y1=${5+260*color+80*wire1} y2=${5+260*color+80*wire2} style="stroke:${['#EC1D2D', '#3A54A2', 'black'][color]};stroke-width:4" />`;
        }

        function setWireSequenceRules(a, a2, a3)
        {
            var svgInner = "";
            for (var i = 0; i < 3; i++) { // letters
                svgInner = svgInner.concat(`
                    <text x="0" y="${15 +260*i}" fill="black" style="font-size: 26px;">A</text>
                    <text x="0" y="${95 +260*i}" fill="black" style="font-size: 26px;">B</text>
                    <text x="0" y="${175+260*i}" fill="black" style="font-size: 26px;">C</text>
                `);
            }
            for (var i = 0; i < 9; i++) { // green lines, circles and wire numbers
                svgInner = svgInner.concat(`<line x1="${33+i*33}" x2="${33+i*33}" y1="0" y2="700" style="stroke:#69bd4d;stroke-width:4" />`);
                for (var j = 0; j < a[i].length; j++)
                    svgInner = svgInner.concat(`<circle r="5" cx=${33+i*33} cy=${5+80*a[i][j]} fill="#EC1D2D" />`);
                svgInner = svgInner.concat(`<rect x=${25+i*33} y=213 width=16 height=26 fill="#69bd4d" />`);
                svgInner = svgInner.concat(`<text x=${25+i*33} y=235 fill="black" style="font-size: 26px;background-color:#69bd4d">${i+1}</text>`);
                for (var j = 0; j < a2[i].length; j++)
                    svgInner = svgInner.concat(`<circle r="5" cx=${33+i*33} cy=${265+80*a2[i][j]} fill="#3A54A2" />`);
                svgInner = svgInner.concat(`<rect x=${25+i*33} y=473 width=16 height=26 fill="#69bd4d" />`);
                svgInner = svgInner.concat(`<text x=${25+i*33} y=495 fill="black" style="font-size: 26px;background-color:#69bd4d">${i+1}</text>`);
                for (var j = 0; j < a3[i].length; j++)
                    svgInner = svgInner.concat(`<circle r="5" cx=${33+i*33} cy=${525+80*a3[i][j]} />`);
            }
            var w = [a, a2, a3];
            for (var i = 0; i < 8; i++) { // wire lines
                for (var j = 0; j < 3; j++) {
                    if (w[j][i].length > 0 && w[j][i+1].length > 0) {
                        if (w[j][i].length === 1) { // 1,x
                            for (var k = 0; k < w[j][i+1].length; k++)
                                svgInner = svgInner.concat(drawLine(i, j, w[j][i][0], w[j][i+1][k]));
                        } else if (w[j][i+1].length === 1) { // x,1
                            for (var k = 0; k < w[j][i].length; k++)
                                svgInner = svgInner.concat(drawLine(i, j, w[j][i][k], w[j][i+1][0]));
                        } else if (w[j][i].length === 2) { // 2,2 or 2,3
                            svgInner = svgInner.concat(drawLine(i, j, w[j][i][0], w[j][i+1][0]));
                            svgInner = svgInner.concat(drawLine(i, j, w[j][i][1], w[j][i+1][1]));
                            if (w[j][i+1].length === 3) { // 2,3
                                svgInner = svgInner.concat(drawLine(i, j, w[j][i][0], 1));
                                svgInner = svgInner.concat(drawLine(i, j, w[j][i][1], 2));
                            }
                        } else { // 3,2 or 3,3
                            svgInner = svgInner.concat(drawLine(i, j, 0, w[j][i+1][0]));
                            svgInner = svgInner.concat(drawLine(i, j, 1, w[j][i+1][1]));
                            if (w[j][i+1].length === 2) { // 3,2
                                svgInner = svgInner.concat(drawLine(i, j, 1, w[j][i+1][0]));
                                svgInner = svgInner.concat(drawLine(i, j, 2, w[j][i+1][1]));
                            } else // 3,3
                                svgInner = svgInner.concat(drawLine(i, j, 2, 2));
                        }
                    }
                }
            }
            document.getElementById("coolImage").innerHTML = svgInner;
        }

        function PopulateSolution(rnd)
        {
            var result = [];
            for (var i = 0; i < NumWiresPerColour; i++)
            {
                var thisList = [];
                for (var j = 0; j < NUM_COLOURS; j++)
                {
                    if (rnd.nextDouble() > 0.55)
                        thisList.push(j);
                }
                result.push(thisList);
            }
            return result;
        }

        function PopulateEmptySolution()
        {
            var result = [];
            for (var i = 0; i < NumWiresPerColour; i++)
                result.push([]);
            return result;
        }
    </script>
</head>
<body>
    <div class="section">
        <div class="page page-bg-02">
            <div class="page-header">
                <span class="page-header-doc-title">Keep Talking and Nobody Explodes</span>
                <span class="page-header-section-title">Wire Sequences</span>
            </div>
            <div class="page-footer absolute-footer"></div>
            <div class="page-content">
                <img src="img/Component/Wire Sequence.svg" class="diagram">
                <h2>On the Subject of Wire Sequences But Awesome</h2>
                <p class="flavour-text">Yo daddy so thicc, he out chungused...Big Chungus!</p>
                <br>
                <table style="border: none; clear: right; float: right;">
                    <tr><td class="corner"></td><th colspan="9">Wire occurrences</th></tr>
                    <tr><th>Red</th><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
                    <tr><th>Blue</th><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
                    <tr><th>Black</th><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td></tr>
                </table>
                <svg id="coolImage" width="305" height="700" style="background-color: white;" xmlns="http://www.w3.org/2000/svg"></svg>
                <div style="clear:both"></div>
            </div>
            <div class="page-footer relative-footer">Page 1 of 1</div>
        </div>
    </div>
</body>
</html>
